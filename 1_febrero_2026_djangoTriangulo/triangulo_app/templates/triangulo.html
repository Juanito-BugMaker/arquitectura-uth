<!DOCTYPE html>
<html>
<head>
    <title>Triángulo Rectángulo</title>
</head>
<body>

<h1>Calcular Triángulo Rectángulo</h1>

<form method="POST">
    {% csrf_token %}

    <label>Base:</label>
    <input type="number" step="any" name="base" required><br><br>

    <label>Altura:</label>
    <input type="number" step="any" name="altura" required><br><br>

    <button type="submit">Calcular</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% if resultado %}
<h2>Resultados</h2>
<p>Área: {{ resultado.area }}</p>
<p>Hipotenusa: {{ resultado.hipotenusa }}</p>
<p>Perímetro: {{ resultado.perimetro }}</p>
{% endif %}

</body>
</html>
